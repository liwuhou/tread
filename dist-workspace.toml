[workspace]
members = ["cargo:."]

# Config for 'dist'
[dist]
# The preferred dist version to use in CI (Cargo.toml SemVer syntax)
cargo-dist-version = "0.32.0"
# CI backends to support
ci = "github"
# Prefix git tags must include for dist to treat them as releases
tag-namespace = "v"
# The installers to generate for each app
installers = ["shell", "powershell", "homebrew"]
# Homebrew tap to publish the generated formula to (GitHub owner/name format)
tap = "liwuhou/homebrew-tap"
# Keep generated Homebrew formulae as release assets. Enable tap publishing after
# liwuhou/homebrew-tap exists and HOMEBREW_TAP_TOKEN is configured.
publish-jobs = []
# Verify packaged target archives before publishing the GitHub Release
global-artifacts-jobs = ["./smoke-packaged-binaries"]
# Target platforms to build apps for (Rust target-triple syntax)
targets = ["aarch64-apple-darwin", "aarch64-unknown-linux-gnu", "x86_64-apple-darwin", "x86_64-unknown-linux-gnu", "x86_64-pc-windows-msvc"]
# Run the x86 macOS build on the Apple Silicon runner; it cross-compiles much faster than queued Intel runners.
github-custom-runners = { "x86_64-apple-darwin" = "macos-latest" }
# Path that installers should place binaries in
install-path = "CARGO_HOME"
# Where to host releases
hosting = "github"
# Whether to install an updater program
install-updater = false
